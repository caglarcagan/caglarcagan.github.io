<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 – Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Courier New', monospace;
      background: linear-gradient(160deg, #0f0f1a, #111827);
      color: #00ffe7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      padding: 2em;
      background-color: rgba(0, 0, 0, 0.4);
      border: 1px solid #00ffe7;
      border-radius: 10px;
      box-shadow: 0 0 10px #00ffe7;
    }

    h1 {
      font-size: 2em;
      text-shadow: 0 0 15px #00ffe7;
    }

    p {
      color: #a0fdfd;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>🛰️ 404 – Page Not Found / Sayfa Bulunamadı</h1>

    <p id="message">
      Redirecting to homepage... / Ana sayfaya yönlendiriliyorsunuz...
    </p>
  </div>

  <script>
    const lang = navigator.language || navigator.userLanguage;

    const message = document.getElementById("message");

    if (lang.startsWith("tr")) {
      message.innerHTML = "Ana sayfaya yönlendiriliyorsunuz...";
    } else {
      message.innerHTML = "Redirecting to homepage...";
    }

    setTimeout(() => {
      window.location.href = "/";
    }, 2000);
  </script>
</body>
</html>
