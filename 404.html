<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 – Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3"> <!-- Sayfayı 3 saniyede bir tazele -->
  <style>
    body {
      margin: 0;
      font-family: 'Courier New', monospace;
      background: linear-gradient(160deg, #0f0f1a, #111827);
      color: #00ffe7;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      text-align: center;
      padding: 2em;
      background-color: rgba(0, 0, 0, 0.4);
      border: 1px solid #00ffe7;
      border-radius: 10px;
      box-shadow: 0 0 10px #00ffe7;
    }

    h1 {
      font-size: 2.4em;
      margin-bottom: 0.5em;
      text-shadow: 0 0 15px #00ffe7;
    }

    p {
      font-size: 1.1em;
      color: #a0fdfd;
      margin-bottom: 1.5em;
      text-shadow: 0 0 8px #00ffe7;
    }

    .loader {
      border: 4px solid #222;
      border-top: 4px solid #00ffe7;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .note {
      margin-top: 2em;
      font-size: 0.9em;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>🛰️ 404 – Portal Not Found</h1>
    <p>You're being rerouted based on your language preferences...  
      <br>Welcome to the Cyber Zone 🌐</p>
    <div class="loader"></div>
    <p class="note">If you're not redirected, please check your connection or try again.</p>
  </div>

  <script>
    const lang = navigator.language || navigator.userLanguage;

    if (lang.startsWith("tr")) {
      window.location.href = "404-tr.html";
    } else if (lang.startsWith("es")) {
      window.location.href = "404-es.html";
    } else {
      window.location.href = "404-en.html";
    }
  </script>
</body>
</html>
