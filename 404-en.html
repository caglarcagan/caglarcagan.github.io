<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Courier New', monospace;
      background: linear-gradient(160deg, #0f0f1a, #111827);
      color: #00ffe7;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 3em;
      text-shadow: 0 0 15px #00ffe7;
    }

    p {
      font-size: 1.2em;
      color: #a0fdfd;
      max-width: 600px;
      margin: 1em;
      text-shadow: 0 0 8px #00ffe7;
    }

    a {
      color: #00ffe7;
      border: 1px solid #00ffe7;
      padding: 0.6em 1.4em;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    a:hover {
      background-color: #00ffe7;
      color: #000;
    }

    .glitch {
      font-size: 1.1em;
      color: #ff004c;
      text-shadow: 0 0 3px #ff004c;
      animation: glitch 1s infinite;
      margin-top: 2em;
    }

    @keyframes glitch {
      0% { transform: translateX(0); }
      20% { transform: translateX(2px); }
      40% { transform: translateX(-2px); }
      60% { transform: translateX(2px); }
      80% { transform: translateX(-2px); }
      100% { transform: translateX(0); }
    }

    .neon-line {
      width: 80%;
      height: 1px;
      background: #00ffe7;
      box-shadow: 0 0 10px #00ffe7;
      margin: 2em auto;
    }
  </style>
</head>
<body>
  <h1>⚠️ 404 - Undefined Sector Detected</h1>
  <p>The page you're looking for seems to be outside the known system boundaries.  
  <br>Or maybe… this is just a simulation error.</p>

  <div class="neon-line"></div>

  <a href="index-en.html">🔙 Return to Home</a>

  <div class="glitch">Data transmission failed... ↻</div>
</body>
</html>
